<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Library</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
header { background: #161b22; border-bottom: 1px solid #30363d; padding: 20px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
header h1 { font-size: 22px; font-weight: 600; color: #f0f6fc; }
header .src { font-size: 13px; color: #8b949e; }
header .upload { margin-left: auto; padding: 8px 18px; border: 1px solid #30363d; border-radius: 6px; background: #238636; color: #fff; cursor: pointer; font-size: 13px; font-weight: 500; text-decoration: none; transition: .15s; }
header .upload:hover { background: #2ea043; border-color: #3fb950; }
nav { display: flex; gap: 4px; padding: 12px 24px; background: #0d1117; border-bottom: 1px solid #21262d; flex-wrap: wrap; }
nav button { padding: 8px 20px; border: 1px solid #30363d; border-radius: 6px; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 14px; font-weight: 500; transition: .15s; }
nav button:hover { background: #30363d; border-color: #8b949e; }
nav button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
.cnt { display: none; padding: 16px 24px; }
.cnt.active { display: block; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; transition: .15s; position: relative; }
.card:hover { border-color: #58a6ff; }
.card .prev-wrap { position: relative; width: 100%; aspect-ratio: 16/10; overflow: hidden; background: #0d1117; cursor: pointer; }
.card .prev-wrap img, .card .prev-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
.card .prev-wrap .play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); opacity: 0; transition: opacity .2s; }
.card .prev-wrap:hover .play-overlay { opacity: 1; }
.card .prev-wrap .play-overlay span { font-size: 48px; color: #fff; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6)); }
.card .prev { width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block; background: #0d1117; }
.card .audio-prev { width: 100%; aspect-ratio: 16/10; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: #1c2128; padding: 16px; }
.card .audio-prev .big-icon { font-size: 48px; }
.card .audio-prev audio { width: 100%; max-width: 260px; }
.card .info { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
.card .info-row { display: flex; gap: 6px; }
.card .info-row button { flex: 1; padding: 5px 8px; border: 1px solid #30363d; border-radius: 4px; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 12px; transition: .15s; text-align: center; }
.card .info-row button:hover { background: #30363d; border-color: #58a6ff; }
.card .info-row button.dl:hover { border-color: #3fb950; }
.card .info-row button.copied, .card .info-row button.done { background: #238636; border-color: #238636; color: #fff; }
.card .name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card .size { font-size: 11px; color: #8b949e; }
.empty { grid-column: 1 / -1; text-align: center; padding: 48px 16px; color: #8b949e; font-size: 15px; }
.err { padding: 16px; background: #3d1f1f; border: 1px solid #da3633; border-radius: 6px; color: #ff7b72; margin-bottom: 16px; }
.loading { text-align: center; padding: 48px; color: #8b949e; }
.spin { display: inline-block; width: 24px; height: 24px; border: 3px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #238636; color: #fff; padding: 10px 20px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 9999; }
.toast.show { opacity: 1; }
footer { text-align: center; padding: 24px; color: #484f58; font-size: 12px; border-top: 1px solid #21262d; margin-top: 24px; }
footer a { color: #58a6ff; text-decoration: none; }
footer a:hover { text-decoration: underline; }

/* Fullscreen overlay */
.overlay { display: none; position: fixed; inset: 0; z-index: 9998; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.overlay .close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; z-index: 1; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background .15s; }
.overlay .close:hover { background: rgba(255,255,255,0.15); }
.overlay .close-x { font-size: 28px; line-height: 1; }
.overlay .ov-content { max-width: 94vw; max-height: 94vh; display: flex; flex-direction: column; align-items: center; gap: 16px; }
.overlay .ov-content img, .overlay .ov-content video { max-width: 94vw; max-height: 85vh; object-fit: contain; border-radius: 6px; }
.overlay .ov-content .ov-name { color: #c9d1d9; font-size: 14px; text-align: center; max-width: 80vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Video controls */
.ov-controls { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 600px; color: #c9d1d9; }
.ov-controls button { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background .15s; flex-shrink: 0; }
.ov-controls button:hover { background: rgba(255,255,255,0.15); }
.ov-controls input[type="range"] { flex: 1; height: 4px; -webkit-appearance: none; appearance: none; background: #484f58; border-radius: 2px; outline: none; cursor: pointer; }
.ov-controls input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #58a6ff; cursor: pointer; }
.ov-controls input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #58a6ff; cursor: pointer; border: none; }
.ov-controls .time { font-size: 12px; min-width: 90px; text-align: center; font-variant-numeric: tabular-nums; }
.ov-controls .vol-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.ov-controls .vol-wrap input { width: 80px; }
</style>
</head>
<body>

<header>
  <h1>📁 Meme Library</h1>
  <span class="src">github.com/kvxnomxyz/memelib</span>
  <a class="upload" href="https://github.com/kvxnomxyz/memelib/issues/new" target="_blank">⬆ Upload a Meme</a>
</header>

<nav id="tabs">
  <button class="active" data-folder="png">🖼 PNG</button>
  <button data-folder="gif">🎞 GIF</button>
  <button data-folder="mp3">🎵 MP3</button>
  <button data-folder="mp4">🎬 MP4</button>
</nav>

<div id="png" class="cnt active"></div>
<div id="gif" class="cnt"></div>
<div id="mp3" class="cnt"></div>
<div id="mp4" class="cnt"></div>

<div class="toast" id="toast">Copied!</div>

<!-- Fullscreen overlay -->
<div class="overlay" id="overlay">
  <button class="close" onclick="closeOverlay()"><span class="close-x">✕</span></button>
  <div class="ov-content" id="ovContent"></div>
</div>

<footer>
  <a href="https://github.com/kvxnomxyz/memelib" target="_blank">kvxnomxyz/memelib</a>
</footer>

<script>
const REPO = 'kvxnomxyz/memelib';
const BRANCH = 'main';
const RAW = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
const API = `https://api.github.com/repos/${REPO}/contents`;

let loaded = {};
let ovVideo = null;
let ovTimer = null;

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.cnt').forEach(c => c.classList.remove('active'));
  const folder = btn.dataset.folder;
  document.getElementById(folder).classList.add('active');
  if (!loaded[folder]) { loaded[folder] = true; loadFolder(folder); }
});

loadFolder('png');

async function loadFolder(folder) {
  const el = document.getElementById(folder);
  el.innerHTML = '<div class="loading"><div class="spin"></div></div>';
  try {
    const res = await fetch(`${API}/${folder}`);
    if (!res.ok) throw new Error(res.status === 403 ? 'Rate limited by GitHub API. Wait a moment and refresh.' : `HTTP ${res.status}`);
    const files = await res.json();
    if (!Array.isArray(files) || files.length === 0) {
      el.innerHTML = '<div class="empty">No files found in this folder.</div>';
      return;
    }
    const items = files.filter(f => f.type === 'file').sort((a, b) => a.name.localeCompare(b.name));
    if (items.length === 0) {
      el.innerHTML = '<div class="empty">No files found in this folder.</div>';
      return;
    }
    el.innerHTML = '<div class="grid"></div>';
    const grid = el.querySelector('.grid');
    for (const file of items) {
      const url = `${RAW}/${folder}/${encodeURIComponent(file.name)}`;
      const card = createCard(file, folder, url);
      grid.appendChild(card);
    }
  } catch (err) {
    el.innerHTML = `<div class="err">${err.message}</div>`;
  }
}

function createCard(file, folder, url) {
  const isImg = folder === 'png' || folder === 'gif';
  const isAudio = folder === 'mp3';
  const isVideo = folder === 'mp4';

  const card = document.createElement('div');
  card.className = 'card';

  let prevHtml = '';
  if (isImg) {
    prevHtml = `<div class="prev-wrap" onclick="openOverlay('${folder}','${encodeURIComponent(file.name)}','${url.replace(/'/g, "\\'")}')">
      <img src="${url}" loading="lazy" alt="${file.name}" onerror="this.alt='❌ load failed'">
      <div class="play-overlay"><span>🔍</span></div>
    </div>`;
  } else if (isAudio) {
    prevHtml = `<div class="audio-prev">
      <div class="big-icon">🎵</div>
      <audio src="${url}" controls preload="none"></audio>
    </div>`;
  } else if (isVideo) {
    prevHtml = `<div class="prev-wrap" onclick="openOverlay('${folder}','${encodeURIComponent(file.name)}','${url.replace(/'/g, "\\'")}')">
      <video src="${url}" muted preload="metadata" loading="lazy" onerror="this.closest('.prev-wrap').innerHTML='<div class=\\'prev\\' style=\\'display:flex;align-items:center;justify-content:center;font-size:48px\\'>🎬</div>'"></video>
      <div class="play-overlay"><span>▶</span></div>
    </div>`;
  }

  card.innerHTML = prevHtml + `
    <div class="info">
      <div class="name" title="${file.name}">${file.name}</div>
      <div class="size">${formatSize(file.size)}</div>
      <div class="info-row">
        <button class="copy" data-url="${url.replace(/"/g, '&quot;')}">📋 Copy</button>
        <button class="dl" data-url="${url.replace(/"/g, '&quot;')}" data-name="${file.name.replace(/"/g, '&quot;')}">⬇ Download</button>
      </div>
    </div>
  `;

  card.querySelector('.copy').addEventListener('click', e => copyUrl(e.currentTarget));
  card.querySelector('.dl').addEventListener('click', e => downloadFile(e.currentTarget));

  return card;
}

function copyUrl(btn) {
  const u = btn.dataset.url;
  navigator.clipboard.writeText(u).then(() => {
    btn.textContent = '✅ Copied!';
    btn.classList.add('copied');
    showToast('Link copied!');
    setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = u; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✅ Copied!';
    btn.classList.add('copied');
    showToast('Link copied!');
    setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function downloadFile(btn) {
  const a = document.createElement('a');
  a.href = btn.dataset.url;
  a.download = btn.dataset.name;
  a.click();
  btn.textContent = '✅ Done';
  btn.classList.add('done');
  setTimeout(() => { btn.textContent = '⬇ Download'; btn.classList.remove('done'); }, 2000);
}

/* --- Fullscreen overlay --- */
function openOverlay(folder, encodedName, url) {
  const ov = document.getElementById('overlay');
  const content = document.getElementById('ovContent');
  ovVideo = null;
  if (ovTimer) { clearInterval(ovTimer); ovTimer = null; }

  const isImg = folder === 'png' || folder === 'gif';
  const isVideo = folder === 'mp4';

  if (isImg) {
    content.innerHTML = `<img src="${url}" alt="${decodeURIComponent(encodedName)}"><div class="ov-name">${decodeURIComponent(encodedName)}</div>`;
  } else if (isVideo) {
    content.innerHTML = `
      <video id="ovVideo" src="${url}" style="max-width:94vw;max-height:75vh"></video>
      <div class="ov-controls">
        <button id="ovPlayBtn" onclick="togglePlay()">⏸</button>
        <input type="range" id="ovSeek" min="0" max="1000" value="0" oninput="seekVideo(this)">
        <span class="time" id="ovTime">0:00 / 0:00</span>
        <div class="vol-wrap">
          <span style="font-size:18px">🔊</span>
          <input type="range" id="ovVol" min="0" max="100" value="100" oninput="setVolume(this)">
        </div>
      </div>
      <div class="ov-name">${decodeURIComponent(encodedName)}</div>
    `;
    ovVideo = document.getElementById('ovVideo');
    ovVideo.volume = 1;
    ovVideo.addEventListener('timeupdate', updateVideoControls);
    ovVideo.addEventListener('loadedmetadata', updateVideoControls);
    ovVideo.addEventListener('ended', () => { document.getElementById('ovPlayBtn').textContent = '▶'; });
    ovVideo.play().catch(() => {});
  }

  ov.classList.add('open');
  document.addEventListener('keydown', ovKeyHandler);
}

function closeOverlay() {
  const ov = document.getElementById('overlay');
  ov.classList.remove('open');
  if (ovVideo) { ovVideo.pause(); ovVideo = null; }
  if (ovTimer) { clearInterval(ovTimer); ovTimer = null; }
  document.getElementById('ovContent').innerHTML = '';
  document.removeEventListener('keydown', ovKeyHandler);
}

function ovKeyHandler(e) {
  if (e.key === 'Escape') closeOverlay();
  if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); togglePlay(); }
}

function togglePlay() {
  if (!ovVideo) return;
  if (ovVideo.paused) { ovVideo.play(); document.getElementById('ovPlayBtn').textContent = '⏸'; }
  else { ovVideo.pause(); document.getElementById('ovPlayBtn').textContent = '▶'; }
}

function seekVideo(el) {
  if (!ovVideo || !ovVideo.duration) return;
  ovVideo.currentTime = (el.value / 1000) * ovVideo.duration;
}

function setVolume(el) {
  if (!ovVideo) return;
  ovVideo.volume = el.value / 100;
  document.getElementById('ovVol').value = el.value;
}

function updateVideoControls() {
  if (!ovVideo) return;
  const seek = document.getElementById('ovSeek');
  const time = document.getElementById('ovTime');
  if (ovVideo.duration) {
    seek.value = (ovVideo.currentTime / ovVideo.duration) * 1000;
  }
  time.textContent = `${fmtTime(ovVideo.currentTime)} / ${fmtTime(ovVideo.duration)}`;
}

function fmtTime(s) {
  if (!s || !isFinite(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function formatSize(bytes) {
  if (!bytes) return '';
  const units = ['B', 'KB', 'MB', 'GB'];
  let i = 0; let size = bytes;
  while (size >= 1024 && i < units.length - 1) { size /= 1024; i++; }
  return `${size.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// Click overlay background to close
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeOverlay();
});
</script>
</body>
</html>
